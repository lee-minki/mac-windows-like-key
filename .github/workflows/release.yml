name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true

jobs:
  build:
    runs-on: macos-14
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.0'
      
      - name: Get version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi
      
      - name: Update version in project
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${VERSION}" WinMacKey/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${GITHUB_RUN_NUMBER}" WinMacKey/Info.plist
      
      - name: Build
        run: |
          xcodebuild -project WinMacKey.xcodeproj \
            -scheme WinMacKey \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            build
      
      - name: Create DMG
        id: dmg
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          APP_PATH="build/DerivedData/Build/Products/Release/WinMacKey.app"
          DMG_NAME="WinMacKey-${VERSION}.dmg"
          
          # Create staging directory
          mkdir -p build/dmg-staging
          cp -r "${APP_PATH}" build/dmg-staging/
          ln -s /Applications build/dmg-staging/Applications
          
          # Create DMG
          hdiutil create -volname "WinMacKey" \
            -srcfolder build/dmg-staging \
            -ov -format UDZO \
            "build/${DMG_NAME}"
          
          echo "DMG_PATH=build/${DMG_NAME}" >> $GITHUB_OUTPUT
          echo "DMG_NAME=${DMG_NAME}" >> $GITHUB_OUTPUT
      
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WinMacKey-DMG
          path: ${{ steps.dmg.outputs.DMG_PATH }}
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.dmg.outputs.DMG_PATH }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
