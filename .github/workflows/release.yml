name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '15.0'

      - name: Get version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Update version in project
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${VERSION}" WinMacKey/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${GITHUB_RUN_NUMBER}" WinMacKey/Info.plist

      # Code signing setup (only when secrets are configured)
      - name: Import signing certificate
        if: env.CERTIFICATE_P12 != ''
        env:
          CERTIFICATE_P12: ${{ secrets.DEVELOPER_ID_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo "$CERTIFICATE_P12" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security import $RUNNER_TEMP/certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productbuild

          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "SIGNING_ENABLED=true" >> $GITHUB_ENV

      - name: Build
        run: |
          BUILD_ARGS=(
            -project WinMacKey.xcodeproj
            -scheme WinMacKey
            -configuration Release
            -derivedDataPath build/DerivedData
          )

          if [ "$SIGNING_ENABLED" = "true" ]; then
            BUILD_ARGS+=(
              CODE_SIGN_IDENTITY="Developer ID Application"
              OTHER_CODE_SIGN_FLAGS="--keychain $KEYCHAIN_PATH"
              CODE_SIGN_STYLE=Manual
            )
          else
            echo "::notice::Building without code signing (secrets not configured)"
            BUILD_ARGS+=(
              CODE_SIGN_IDENTITY="-"
              CODE_SIGNING_REQUIRED=NO
            )
          fi

          xcodebuild "${BUILD_ARGS[@]}" build

      # Sign the app bundle (if certificate available)
      - name: Sign app bundle
        if: env.SIGNING_ENABLED == 'true'
        run: |
          APP_PATH="build/DerivedData/Build/Products/Release/WinMacKey.app"
          codesign --deep --force --options runtime \
            --sign "Developer ID Application" \
            --keychain "$KEYCHAIN_PATH" \
            "$APP_PATH"
          codesign --verify --verbose "$APP_PATH"

      - name: Create DMG
        id: dmg
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          APP_PATH="build/DerivedData/Build/Products/Release/WinMacKey.app"
          DMG_NAME="WinMacKey-${VERSION}.dmg"

          # Create staging directory
          mkdir -p build/dmg-staging
          cp -r "${APP_PATH}" build/dmg-staging/
          ln -s /Applications build/dmg-staging/Applications

          # Create DMG
          hdiutil create -volname "WinMacKey" \
            -srcfolder build/dmg-staging \
            -ov -format UDZO \
            "build/${DMG_NAME}"

          # Sign DMG if possible
          if [ "$SIGNING_ENABLED" = "true" ]; then
            codesign --sign "Developer ID Application" \
              --keychain "$KEYCHAIN_PATH" \
              "build/${DMG_NAME}"
          fi

          echo "DMG_PATH=build/${DMG_NAME}" >> $GITHUB_OUTPUT
          echo "DMG_NAME=${DMG_NAME}" >> $GITHUB_OUTPUT

      # Notarize (only when Apple ID credentials are configured)
      - name: Notarize DMG
        if: env.SIGNING_ENABLED == 'true' && env.NOTARY_APPLE_ID != ''
        env:
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_APP_PASSWORD }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
        run: |
          DMG_PATH=${{ steps.dmg.outputs.DMG_PATH }}

          echo "Submitting for notarization..."
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$NOTARY_APPLE_ID" \
            --password "$NOTARY_PASSWORD" \
            --team-id "$NOTARY_TEAM_ID" \
            --wait

          echo "Stapling notarization ticket..."
          xcrun stapler staple "$DMG_PATH"

      - name: Clean up keychain
        if: always() && env.KEYCHAIN_PATH != ''
        run: |
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WinMacKey-DMG
          path: ${{ steps.dmg.outputs.DMG_PATH }}

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.dmg.outputs.DMG_PATH }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
